name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///${{ runner.temp }}/claimvault.db
      EXPORT_ROOT: ${{ runner.temp }}/exports
      EVIDENCE_ROOT: ${{ runner.temp }}/evidence
      VAULT_PACKAGER: default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e apps/api[dev]
      - name: Import guard
        run: python scripts/check_imports.py
      - name: Run Ruff
        run: cd apps/api && ruff check app tests
      - name: Run pytest
        run: cd apps/api && pytest tests
      - name: Migration smoke test
        run: |
          cd apps/api
          alembic upgrade head

  frontend-lint:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Run frontend lint
        run: cd apps/web && pnpm lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Run TypeScript typecheck
        run: cd apps/web && pnpm typecheck
